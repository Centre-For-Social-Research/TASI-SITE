<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in Scanner | TASI 2026 — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- jsQR — pure JS QR decoder, no build step -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

    <style>
        /* ─── Reset & Tokens ─────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Inter', sans-serif;
            --bg: #09090B;
            --surface: #18181B;
            --surface-2: #27272A;
            --border: rgba(255,255,255,0.08);
            --text: #D4D4D8;
            --text-muted: #71717A;
            --accent-blue: #3B82F6;
            --green: #22C55E;
            --amber: #F59E0B;
            --red: #EF4444;
            --transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        html, body {
            height: 100%;
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* ─── Layout ─────────────────────────────────────── */
        .app {
            display: grid;
            grid-template-columns: 400px 1fr;
            height: 100vh;
        }

        /* ─── Sidebar ────────────────────────────────────── */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 1.5rem 1.75rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .sidebar-header .logo-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.25rem;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: white;
            flex-shrink: 0;
        }

        .logo-text {
            font-family: var(--font-heading);
            font-size: 1rem;
            font-weight: 700;
            color: white;
        }

        .logo-sub {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 0.1rem;
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            margin-top: 0.75rem;
            background: rgba(59,130,246,0.12);
            border: 1px solid rgba(59,130,246,0.25);
            color: #60A5FA;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
        }

        /* ─── Stats bar ──────────────────────────────────── */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .stat-cell {
            padding: 1rem;
            text-align: center;
            border-right: 1px solid var(--border);
        }
        .stat-cell:last-child { border-right: none; }

        .stat-num {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            line-height: 1;
        }

        .stat-num.green { color: var(--green); }
        .stat-num.amber { color: var(--amber); }
        .stat-num.red   { color: var(--red); }

        .stat-lbl {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-top: 0.3rem;
        }

        /* ─── Log ────────────────────────────────────────── */
        .log-header {
            padding: 1rem 1.75rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .log-clear-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.7rem;
            font-family: var(--font-body);
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        .log-clear-btn:hover { color: var(--text); }

        .log-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 1.25rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .log-list::-webkit-scrollbar { width: 4px; }
        .log-list::-webkit-scrollbar-track { background: transparent; }
        .log-list::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 4px; }

        .log-item {
            background: var(--surface-2);
            border-radius: 10px;
            padding: 0.85rem 1rem;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            border-left: 3px solid transparent;
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            flex-shrink: 0;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-12px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .log-item.accepted   { border-color: var(--green); }
        .log-item.duplicate  { border-color: var(--amber); }
        .log-item.rejected   { border-color: var(--red); }

        .log-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 4px;
            flex-shrink: 0;
        }
        .accepted .log-dot  { background: var(--green); }
        .duplicate .log-dot { background: var(--amber); }
        .rejected .log-dot  { background: var(--red); }

        .log-content .log-name {
            font-weight: 600;
            font-size: 0.875rem;
            color: white;
        }
        .log-content .log-detail {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.1rem;
        }
        .log-content .log-time {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .log-empty {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            padding: 3rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        .log-empty i { font-size: 2rem; opacity: 0.3; }

        /* ─── Settings footer ────────────────────────────── */
        .sidebar-footer {
            border-top: 1px solid var(--border);
            padding: 1rem 1.75rem;
            flex-shrink: 0;
        }

        .settings-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .settings-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
        }

        .settings-input {
            flex: 1;
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 0.78rem;
            font-family: 'Courier New', monospace;
            padding: 0.45rem 0.65rem;
            border-radius: 7px;
            outline: none;
            transition: border-color 0.2s;
        }
        .settings-input:focus { border-color: rgba(59,130,246,0.5); }

        /* ─── Camera area ────────────────────────────────── */
        .camera-area {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
        }

        /* Top toolbar */
        .cam-toolbar {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            z-index: 10;
        }

        .cam-status-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--border);
            backdrop-filter: blur(8px);
            padding: 0.4rem 0.85rem;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text);
        }

        .pulse-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            flex-shrink: 0;
        }
        .pulse-dot.active {
            background: var(--green);
            animation: pulse 1.4s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
        }

        .cam-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.55rem 1.1rem;
            border-radius: 999px;
            font-family: var(--font-heading);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
        }

        .cam-btn-start {
            background: var(--green);
            color: #000;
        }
        .cam-btn-start:hover { background: #16A34A; }

        .cam-btn-stop {
            background: rgba(239,68,68,0.15);
            color: var(--red);
            border: 1px solid rgba(239,68,68,0.3);
        }
        .cam-btn-stop:hover { background: rgba(239,68,68,0.25); }

        /* Video */
        #videoEl {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        #videoEl.active { display: block; }

        /* Idle placeholder */
        .cam-idle {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            color: var(--text-muted);
            text-align: center;
            padding: 2rem;
        }
        .cam-idle.hidden { display: none; }

        .cam-idle-icon {
            width: 80px;
            height: 80px;
            border-radius: 24px;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: var(--text-muted);
        }

        .cam-idle h3 {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            color: var(--text);
            font-weight: 600;
        }

        .cam-idle p {
            font-size: 0.85rem;
            max-width: 280px;
            line-height: 1.5;
        }

        /* Hidden canvas for frame capture */
        #scanCanvas { display: none; }

        /* ─── Crosshair / scan frame overlay ─────────────── */
        .scan-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
        .scan-overlay.hidden { display: none; }

        .scan-frame {
            width: 220px;
            height: 220px;
            position: relative;
        }

        .scan-frame::before,
        .scan-frame::after,
        .scan-frame .corner-br,
        .scan-frame .corner-bl {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: white;
            border-style: solid;
        }

        .scan-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
        .scan-frame::after  { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
        .scan-frame .corner-br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
        .scan-frame .corner-bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }

        /* Scanning line */
        .scan-line {
            position: absolute;
            left: 4px;
            right: 4px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-blue), transparent);
            top: 0;
            animation: scanMove 2s linear infinite;
            box-shadow: 0 0 8px var(--accent-blue);
        }

        @keyframes scanMove {
            0%   { top: 0%; }
            100% { top: 100%; }
        }

        /* ─── Result overlay ─────────────────────────────── */
        .result-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(2px);
        }

        .result-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .result-overlay.accepted  { background: rgba(22, 163, 74, 0.85); }
        .result-overlay.duplicate { background: rgba(217, 119, 6, 0.85); }
        .result-overlay.rejected  { background: rgba(185, 28, 28, 0.85); }
        .result-overlay.error     { background: rgba(80, 20, 20, 0.92); }

        .result-card {
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            text-align: center;
            max-width: 320px;
            width: 90%;
            animation: popIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes popIn {
            from { transform: scale(0.88); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }

        .result-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            line-height: 1;
        }

        .result-status {
            font-family: var(--font-heading);
            font-size: 1.4rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.5rem;
        }

        .result-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            margin-bottom: 0.25rem;
        }

        .result-detail {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.75);
            margin-bottom: 0.15rem;
        }

        .result-next-btn {
            margin-top: 1.5rem;
            background: white;
            color: #000;
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 999px;
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .result-next-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        /* ─── Fetching spinner ───────────────────────────── */
        .fetch-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 15;
            gap: 1rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .fetch-overlay.show { opacity: 1; pointer-events: all; }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .fetch-text {
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* ─── Responsive ─────────────────────────────────── */
        @media (max-width: 768px) {
            .app { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
            .sidebar { order: 2; max-height: 45vh; border-right: none; border-top: 1px solid var(--border); }
            .camera-area { order: 1; min-height: 55vh; }
        }
    </style>
</head>
<body>

<div class="app">

    <!-- ═══════════════════════════════════════════════════════
         SIDEBAR
    ════════════════════════════════════════════════════════ -->
    <aside class="sidebar">

        <!-- Header -->
        <div class="sidebar-header">
            <div class="logo-row">
                <div class="logo-icon"><i class="ph ph-qr-code"></i></div>
                <div>
                    <div class="logo-text">TASI 2026</div>
                    <div class="logo-sub">Check-in System</div>
                </div>
            </div>
            <div class="admin-badge">
                <i class="ph ph-shield-check"></i> Admin Access Only
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-cell">
                <div class="stat-num green" id="countAccepted">0</div>
                <div class="stat-lbl">Checked In</div>
            </div>
            <div class="stat-cell">
                <div class="stat-num amber" id="countDuplicate">0</div>
                <div class="stat-lbl">Duplicates</div>
            </div>
            <div class="stat-cell">
                <div class="stat-num red" id="countRejected">0</div>
                <div class="stat-lbl">Rejected</div>
            </div>
        </div>

        <!-- Log -->
        <div class="log-header">
            <span>Scan Log</span>
            <button class="log-clear-btn" id="clearLogBtn">
                <i class="ph ph-trash"></i> Clear
            </button>
        </div>

        <div class="log-list" id="logList">
            <div class="log-empty" id="logEmpty">
                <i class="ph ph-clock-counter-clockwise"></i>
                <span>Scan results will appear here</span>
            </div>
        </div>

        <!-- Settings -->
        <div class="sidebar-footer">
            <div class="settings-row">
                <span class="settings-label">Backend&nbsp;URL</span>
                <input type="text" class="settings-input" id="backendUrl"
                    value="https://localhost:5001" placeholder="https://localhost:5001">
            </div>
            <div class="settings-row">
                <span class="settings-label">API&nbsp;Key</span>
                <input type="password" class="settings-input" id="apiKey"
                    value="" placeholder="CHECKIN_API_KEY">
            </div>
        </div>

    </aside>

    <!-- ═══════════════════════════════════════════════════════
         CAMERA AREA
    ════════════════════════════════════════════════════════ -->
    <main class="camera-area">

        <!-- Toolbar -->
        <div class="cam-toolbar">
            <div class="cam-status-pill">
                <div class="pulse-dot" id="statusDot"></div>
                <span id="statusText">Camera off</span>
            </div>
            <div style="display:flex; gap:0.6rem;">
                <button class="cam-btn cam-btn-start" id="startBtn">
                    <i class="ph ph-video-camera"></i> Start Camera
                </button>
                <button class="cam-btn cam-btn-stop hidden" id="stopBtn">
                    <i class="ph ph-stop-circle"></i> Stop
                </button>
            </div>
        </div>

        <!-- Idle placeholder -->
        <div class="cam-idle" id="camIdle">
            <div class="cam-idle-icon"><i class="ph ph-qr-code"></i></div>
            <h3>Ready to Scan</h3>
            <p>Click <strong>Start Camera</strong> to activate the QR scanner.<br>Point the camera at a delegate's entry pass QR code.</p>
        </div>

        <!-- Video feed -->
        <video id="videoEl" autoplay muted playsinline></video>

        <!-- Hidden canvas for frame grab -->
        <canvas id="scanCanvas"></canvas>

        <!-- Crosshair overlay -->
        <div class="scan-overlay hidden" id="scanOverlay">
            <div class="scan-frame">
                <div class="corner-br"></div>
                <div class="corner-bl"></div>
                <div class="scan-line"></div>
            </div>
        </div>

        <!-- Fetching overlay -->
        <div class="fetch-overlay" id="fetchOverlay">
            <div class="spinner"></div>
            <span class="fetch-text">Verifying delegate…</span>
        </div>

        <!-- Result overlay -->
        <div class="result-overlay" id="resultOverlay">
            <div class="result-card">
                <div class="result-icon" id="resultIcon">✅</div>
                <div class="result-status" id="resultStatus">Accepted</div>
                <div class="result-name" id="resultName"></div>
                <div class="result-detail" id="resultOrg"></div>
                <div class="result-detail" id="resultCat"></div>
                <button class="result-next-btn" id="nextScanBtn">
                    <i class="ph ph-arrow-clockwise"></i> Scan Next
                </button>
            </div>
        </div>

    </main>
</div>

<script>
(function () {
    'use strict';

    /* ── State ───────────────────────────────────────────── */
    let stream        = null;
    let scanning      = false;
    let scanInterval  = null;
    let lastScanned   = null;   // debounce same QR
    let counts        = { accepted: 0, duplicate: 0, rejected: 0 };

    /* ── DOM refs ────────────────────────────────────────── */
    const video        = document.getElementById('videoEl');
    const canvas       = document.getElementById('scanCanvas');
    const ctx          = canvas.getContext('2d', { willReadFrequently: true });
    const startBtn     = document.getElementById('startBtn');
    const stopBtn      = document.getElementById('stopBtn');
    const statusDot    = document.getElementById('statusDot');
    const statusText   = document.getElementById('statusText');
    const scanOverlay  = document.getElementById('scanOverlay');
    const fetchOverlay = document.getElementById('fetchOverlay');
    const resultOverlay= document.getElementById('resultOverlay');
    const camIdle      = document.getElementById('camIdle');
    const logList      = document.getElementById('logList');
    const logEmpty     = document.getElementById('logEmpty');
    const clearLogBtn  = document.getElementById('clearLogBtn');
    const backendInput = document.getElementById('backendUrl');
    const apiKeyInput  = document.getElementById('apiKey');

    /* ── Camera ──────────────────────────────────────────── */
    startBtn.addEventListener('click', startCamera);
    stopBtn.addEventListener('click',  stopCamera);

    async function startCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
            });
            video.srcObject = stream;
            video.classList.add('active');
            camIdle.classList.add('hidden');
            scanOverlay.classList.remove('hidden');
            statusDot.classList.add('active');
            statusText.textContent = 'Scanning…';
            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            scanning = true;
            beginScanLoop();
        } catch (err) {
            alert('Camera access denied or unavailable.\n\n' + err.message);
        }
    }

    function stopCamera() {
        scanning = false;
        clearInterval(scanInterval);
        if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
        video.srcObject = null;
        video.classList.remove('active');
        camIdle.classList.remove('hidden');
        scanOverlay.classList.add('hidden');
        statusDot.classList.remove('active');
        statusText.textContent = 'Camera off';
        startBtn.classList.remove('hidden');
        stopBtn.classList.add('hidden');
        hideResult();
    }

    /* ── Scan loop ───────────────────────────────────────── */
    function beginScanLoop() {
        scanInterval = setInterval(grabFrame, 500);
    }

    function grabFrame() {
        if (!scanning || video.readyState < video.HAVE_ENOUGH_DATA) return;
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: 'dontInvert'
        });
        if (code && code.data && code.data !== lastScanned) {
            lastScanned = code.data;
            handleScan(code.data);
        }
    }

    /* ── Handle scanned QR ───────────────────────────────── */
    async function handleScan(rawData) {
        // Pause scanning while we resolve
        scanning = false;
        clearInterval(scanInterval);

        // Extract the id from the QR payload
        let id;
        try {
            const parsed = JSON.parse(rawData);
            id = parsed.id || rawData;
        } catch {
            id = rawData;
        }

        // Show fetching
        fetchOverlay.classList.add('show');

        const backendBase = backendInput.value.replace(/\/$/, '');
        const apiKey = apiKeyInput.value.trim();
        let status, data;

        try {
            const res = await fetch(`${backendBase}/api/v1/postData`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-Key': apiKey
                },
                body: JSON.stringify({ id })
            });
            status = res.status;
            data   = await res.json().catch(() => ({}));
        } catch (err) {
            status = 0; // network error
            data   = { message: err.message };
        }

        fetchOverlay.classList.remove('show');
        showResult(status, data, id);
    }

    /* ── Show result ─────────────────────────────────────── */
    function showResult(status, data, id) {
        resultOverlay.className = 'result-overlay show';

        let icon, type, statusLabel, name = '', org = '', cat = '';

        if (status === 200) {
            type = 'accepted';
            icon = '✅';
            statusLabel = 'Check-in Accepted';
            name = data.username  || data.name  || id;
            org  = data.teamName  || data.org   || '';
            cat  = data.tShirt    ? `T-Shirt: ${data.tShirt}` : (data.cat || '');
            counts.accepted++;
        } else if (status === 409) {
            type = 'duplicate';
            icon = '🟡';
            statusLabel = 'Already Checked In';
            name = 'This delegate has already been checked in.';
            counts.duplicate++;
        } else if (status === 404) {
            type = 'rejected';
            icon = '❌';
            statusLabel = 'Not Found';
            name = 'This QR code is not registered in the system.';
            counts.rejected++;
        } else {
            type = 'error';
            icon = '⚠️';
            statusLabel = 'Connection Error';
            name = 'Could not reach the backend server.';
            org  = data.message || '';
        }

        resultOverlay.classList.add(type);
        document.getElementById('resultIcon').textContent   = icon;
        document.getElementById('resultStatus').textContent = statusLabel;
        document.getElementById('resultName').textContent   = name;
        document.getElementById('resultOrg').textContent    = org;
        document.getElementById('resultCat').textContent    = cat;

        // Update counts
        document.getElementById('countAccepted').textContent  = counts.accepted;
        document.getElementById('countDuplicate').textContent = counts.duplicate;
        document.getElementById('countRejected').textContent  = counts.rejected;

        // Add to log
        addLog(type, name, org, cat);
    }

    /* ── Hide result / next scan ─────────────────────────── */
    document.getElementById('nextScanBtn').addEventListener('click', () => {
        hideResult();
        lastScanned = null;   // allow re-scanning
        if (stream) {
            scanning = true;
            beginScanLoop();
        }
    });

    function hideResult() {
        resultOverlay.className = 'result-overlay';
    }

    /* ── Log ─────────────────────────────────────────────── */
    function addLog(type, name, detail1, detail2) {
        logEmpty.style.display = 'none';

        const item = document.createElement('div');
        item.className = `log-item ${type}`;

        const now = new Date();
        const time = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        item.innerHTML = `
            <div class="log-dot"></div>
            <div class="log-content">
                <div class="log-name">${escHtml(name)}</div>
                ${detail1 ? `<div class="log-detail">${escHtml(detail1)}</div>` : ''}
                ${detail2 ? `<div class="log-detail">${escHtml(detail2)}</div>` : ''}
                <div class="log-time">${time}</div>
            </div>`;

        logList.insertBefore(item, logList.firstChild);
    }

    clearLogBtn.addEventListener('click', () => {
        logList.querySelectorAll('.log-item').forEach(el => el.remove());
        logEmpty.style.display = '';
    });

    /* ── Helpers ─────────────────────────────────────────── */
    function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    /* ── Hidden class toggle helper ──────────────────────── */
    HTMLElement.prototype.classList.toggle; // already available

    /* Add hidden class to start btn initially visible helpers */
    document.querySelectorAll('.hidden').forEach(el => {
        el.style.display = 'none';
    });

    startBtn.addEventListener('click', () => {
        startBtn.style.display  = 'none';
        stopBtn.style.display   = '';
    });
    stopBtn.addEventListener('click', () => {
        stopBtn.style.display   = 'none';
        startBtn.style.display  = '';
    });

})();
</script>
</body>
</html>
